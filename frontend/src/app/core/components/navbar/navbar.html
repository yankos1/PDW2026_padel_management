<mat-sidenav-container class="layout">

  <mat-sidenav #drawer [mode]="isMobile ? 'over' : 'side'" [opened]="!isMobile" class="sidenav">

    <div class="logo">
      PADEL
    </div>

    <div class="menu">

      @if (isLoggedIn()) {
        <button mat-button routerLink="/home" routerLinkActive="router-link-active" (click)="closeMenu(drawer)">Accueil</button>
        <button mat-button routerLink="/match" routerLinkActive="router-link-active" (click)="closeMenu(drawer)">Matchs</button>
        <button mat-button routerLink="/mes-reservations" routerLinkActive="router-link-active" (click)="closeMenu(drawer)">Mes reservations</button>
        <button mat-button routerLink="/create-match" routerLinkActive="router-link-active" (click)="closeMenu(drawer)">Creer un match</button>
        @if (authService.isAdmin()) {
          <button mat-button routerLink="/admin" routerLinkActive="router-link-active" (click)="closeMenu(drawer)">Admin</button>
        }
      }

    </div>

  </mat-sidenav>

  <mat-sidenav-content class="main">

    <div class="topbar">

      @if (isLoggedIn()) {
        <button mat-button class="mobile-menu-btn" type="button" (click)="drawer.toggle()">
          Menu
        </button>
      }

      <div class="spacer"></div>

      @if (isLoggedIn()) {
        <div class="user">

          <a class="account-link" routerLink="/mon-compte">
            {{ user?.prenom }} {{ user?.nom }}
          </a>

          <button mat-button class="logout-btn" (click)="logout()">
            Deconnexion
          </button>

        </div>
      }

    </div>

    <div class="content">
      <router-outlet></router-outlet>
    </div>

  </mat-sidenav-content>

</mat-sidenav-container>
