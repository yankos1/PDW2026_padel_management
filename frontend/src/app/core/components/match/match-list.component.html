<h2 class="title">Matchs publics disponibles</h2>

<div class="match-container">
  @for (match of matchs(); track match.id) {

    <mat-card class="match-card">

      <mat-card-header>
        <mat-card-title>Match #{{ match.id }}</mat-card-title>
        <mat-card-subtitle>
          {{ match.dateHeureDebut | date:'dd/MM/yyyy HH:mm' }}
        </mat-card-subtitle>
      </mat-card-header>

      <mat-card-content>
        <p>
          Participants :
          <strong>{{ match.nbParticipants }}</strong>
        </p>
      </mat-card-content>

      <mat-card-actions align="end">
        <button
          mat-raised-button color="primary"
          (click)="rejoindreMatch(match)">
          Rejoindre
        </button>
      </mat-card-actions>

    </mat-card>

  }
</div>

<mat-divider></mat-divider>

<p class="match-count">
  Nombre de matchs : <strong>{{ matchs().length }}</strong>
</p>
